<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Clothing Corner</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="module" src="./assets/js/main.js"></script>
</head>
<body class="font-sans text-gray-800">

  <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3 navbar-custom">
    <div class="container-fluid px-0">
      <a class="navbar-brand" href="index.html">
        <span class="d-flex flex-column text-uppercase text-xs fw-bold lh-sm">
          <span style="letter-spacing: .12rem;">Clothing Corner</span>
          <span>Store</span>
        </span>
      </a>
      <div class="mx-auto d-lg-block d-none">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
        </ul>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="login.html" class="nav-link fw-semibold">Login</a>
        <a href="register.html" class="nav-link fw-semibold">Register</a>
        <button onclick="toggleTheme()" id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <section class="py-lg-8 py-5 text-center">
      <div class="container"><div class="row justify-content-center"><div class="col-lg-6">
        <h1 class="display-5 mb-3">Login</h1>
        <p class="text-muted lead">Sign in to continue shopping and manage your orders.</p>
      </div></div></div>
    </section>
    <section class="py-lg-8 py-5">
      <div class="container"><div class="row justify-content-center"><div class="col-lg-5 col-md-7">
        <div class="card border-0 shadow-sm"><div class="card-body p-4 p-lg-5">
          <h3 class="h4 mb-2 text-center">Welcome Back</h3>
          <p class="text-muted text-center mb-4">Enter your email and password</p>
          <div id="messageBox"></div>
          <form id="loginForm">
            <div class="mb-3"><label class="form-label">Email</label><input type="email" name="name" id="email" class="form-control" required /></div>
            <div class="mb-4"><label class="form-label">Password</label><input type="password" name="pass" id="password" class="form-control" required /></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
          <p class="text-center text-muted mt-4 mb-0">Don't have an account? <a href="register.html" class="fw-semibold">Create account</a></p>
          <a href="products.html" class="btn btn-outline-primary w-100 mt-3">Back to Products</a>
        </div></div>
      </div></div></div>
    </section>
  </main>
  <script>
    const API_BASE_URL = "https://localhost:7187/api";
    const form = document.getElementById("loginForm");
    const messageBox = document.getElementById("messageBox");
    function showMessage(type, message) {
      messageBox.innerHTML = `<div class="alert alert-${type === "success" ? "success" : "danger"}">${message}</div>`;
    }
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const response = await fetch(`${API_BASE_URL}/Auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const text = await response.text();
        const result = text ? JSON.parse(text) : null;
        if (!response.ok || !result?.success) {
          showMessage("danger", result?.message || "Login failed");
          return;
        }
        localStorage.setItem("token", result.data.token);
        localStorage.setItem("email", result.data.email);
        localStorage.setItem("role", result.data.role);
        showMessage("success", "Login successful ✅ Redirecting...");
        setTimeout(() => { window.location.href = "products.html"; }, 900);
      } catch (error) {
        console.error(error);
        showMessage("danger", "API connection error");
      }
    });
  </script>
  <script src="./assets/js/theme.js"></script>
</body>
</html>
