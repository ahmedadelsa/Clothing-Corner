<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment - Clothing Corner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
  body {
    visibility: hidden;
  }

  body.app-loaded {
    visibility: visible;
  }
</style>
  <script type="module" src="./assets/js/main.js"></script>
</head>

<body class="font-sans text-gray-800">

<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3 navbar-custom">
  <div class="container-fluid px-0">
    <a class="navbar-brand" href="index.html">
      <span class="d-flex flex-column text-uppercase text-xs fw-bold lh-sm">
        <span style="letter-spacing: .12rem;">Clothing Corner</span>
        <span>Store</span>
      </span>
    </a>

    <div class="mx-auto d-lg-block d-none">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
      </ul>
    </div>

    <div class="d-flex align-items-center gap-3 flex-wrap" id="authArea"></div>
  </div>
</nav>

<main>
  <section class="py-lg-8 py-5 text-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <h1 class="display-5 mb-3">Payment</h1>
          <p class="text-muted lead">Complete your payment to place the order.</p>
        </div>
      </div>
    </div>
  </section>

  <section class="py-lg-8 py-5">
    <div class="container">
      <div id="messageBox"></div>

      <div class="row g-4 justify-content-center">
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="h5 mb-0">Card Details</h3>
                <div class="d-flex gap-2 text-muted">
                  <i class="fa-brands fa-cc-visa fa-2x"></i>
                  <i class="fa-brands fa-cc-mastercard fa-2x"></i>
                </div>
              </div>

              <form id="paymentForm">
                <div class="mb-3">
                  <label class="form-label">Cardholder Name</label>
                  <input type="text" id="cardName" class="form-control" placeholder="Ahmed Adel" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Card Number</label>
                  <input type="text" id="cardNumber" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Expiry</label>
                    <input type="text" id="expiry" class="form-control" placeholder="MM/YY" maxlength="5" required>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">CVV</label>
                    <input type="password" id="cvv" class="form-control" placeholder="123" maxlength="4" required>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  Pay Now
                </button>
              </form>

              <a href="checkout.html" class="btn btn-outline-primary w-100 mt-3">
                Back to Checkout
              </a>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h3 class="h5 mb-4">Payment Summary</h3>

              <div class="mb-3">
                <span class="text-muted d-block">Shipping Address</span>
                <strong id="addressText">-</strong>
              </div>

              <div class="mb-3">
                <span class="text-muted d-block">Phone Number</span>
                <strong id="phoneText">-</strong>
              </div>

              <hr>

              <div id="summaryBox">
                <p class="text-muted mb-0">Loading summary...</p>
              </div>

              <div class="alert alert-info mt-4 mb-0">
                This is a fake payment gateway for demo purposes.
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
</main>

<script>
  const API_BASE_URL = "https://localhost:7187/api";

  const form = document.getElementById("paymentForm");
  const messageBox = document.getElementById("messageBox");
  const summaryBox = document.getElementById("summaryBox");

  function showMessage(type, message) {
    messageBox.innerHTML = `
      <div class="alert alert-${type === "success" ? "success" : "danger"}">
        ${message}
      </div>
    `;
  }

  function getTokenOrRedirect() {
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
      return null;
    }

    return token;
  }

  function loadShippingInfo() {
    const shippingAddress = localStorage.getItem("shippingAddress");
    const phoneNumber = localStorage.getItem("phoneNumber");

    document.getElementById("addressText").textContent = shippingAddress || "-";
    document.getElementById("phoneText").textContent = phoneNumber || "-";

    if (!shippingAddress || !phoneNumber) {
      showMessage("danger", "Missing shipping information. Please complete checkout first.");
      form.querySelector("button").disabled = true;
    }
  }

  async function loadSummary() {
    const token = getTokenOrRedirect();
    if (!token) return;

    try {
      const response = await fetch(`${API_BASE_URL}/Cart`, {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const text = await response.text();
      const data = text ? JSON.parse(text) : null;

      if (!response.ok) {
        summaryBox.innerHTML = `<p class="text-danger">Could not load summary.</p>`;
        return;
      }

      const items = data.items || data.data?.items || [];
      const total = data.total || data.data?.total || 0;

      if (items.length === 0) {
        summaryBox.innerHTML = `
          <p class="text-muted">Your cart is empty.</p>
          <a href="products.html" class="btn btn-primary w-100">Browse Products</a>
        `;
        form.querySelector("button").disabled = true;
        return;
      }

      summaryBox.innerHTML = `
        ${items.map(item => `
          <div class="d-flex justify-content-between border-bottom py-2">
            <div>
              <strong>${item.productName}</strong>
              <div class="small text-muted">Qty: ${item.quantity}</div>
            </div>
            <span>$${item.totalPrice}</span>
          </div>
        `).join("")}

        <div class="d-flex justify-content-between mt-4">
          <h5>Total</h5>
          <h5>$${total}</h5>
        </div>
      `;
    } catch (error) {
      console.error(error);
      summaryBox.innerHTML = `<p class="text-danger">API connection error.</p>`;
    }
  }

  function validatePayment() {
    const cardName = document.getElementById("cardName").value.trim();
    const cardNumber = document.getElementById("cardNumber").value.replace(/\s/g, "");
    const expiry = document.getElementById("expiry").value.trim();
    const cvv = document.getElementById("cvv").value.trim();

    if (cardName.length < 3) {
      showMessage("danger", "Cardholder name is required.");
      return false;
    }

    if (!/^[0-9]{12,19}$/.test(cardNumber)) {
      showMessage("danger", "Invalid card number.");
      return false;
    }

    if (!/^(0[1-9]|1[0-2])\/[0-9]{2}$/.test(expiry)) {
      showMessage("danger", "Expiry must be in MM/YY format.");
      return false;
    }

    if (!/^[0-9]{3,4}$/.test(cvv)) {
      showMessage("danger", "Invalid CVV.");
      return false;
    }

    return true;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const token = getTokenOrRedirect();
    if (!token) return;

    if (!validatePayment()) return;

    const shippingAddress = localStorage.getItem("shippingAddress");
    const phoneNumber = localStorage.getItem("phoneNumber");

    if (!shippingAddress || !phoneNumber) {
      showMessage("danger", "Missing shipping information.");
      return;
    }

    try {
      const response = await fetch(`${API_BASE_URL}/Orders/checkout`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          shippingAddress,
          phoneNumber
        })
      });

      const text = await response.text();
      const result = text ? JSON.parse(text) : null;

      if (!response.ok || !result?.success) {
        showMessage("danger", result?.message || "Payment failed.");
        return;
      }

      localStorage.removeItem("shippingAddress");
      localStorage.removeItem("phoneNumber");

      showMessage("success", "Payment successful ✅ Order placed.");

      setTimeout(() => {
        window.location.href = "orders.html";
      }, 1000);

    } catch (error) {
      console.error(error);
      showMessage("danger", "API connection error.");
    }
  });

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }

  function renderNavbar() {
    const role = localStorage.getItem("role");
    const token = localStorage.getItem("token");
    const authArea = document.getElementById("authArea");

    if (!authArea) return;

    if (!token) {
      authArea.innerHTML = `
        <a href="login.html" class="nav-link fw-semibold">Login</a>
        <a href="register.html" class="nav-link fw-semibold">Register</a>
        <button onclick="toggleTheme()" id="themeToggle" class="theme-btn">
          <i class="fa-solid fa-moon"></i>
        </button>
      `;
      return;
    }

    authArea.innerHTML = `
      ${role === "Admin" ? `<a href="admin.html" class="nav-link fw-semibold">Admin</a>` : ""}
      <a href="orders.html" class="nav-link fw-semibold">My Orders</a>
      <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
      <button onclick="toggleTheme()" id="themeToggle" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
      </button>
    `;
  }

  renderNavbar();
  loadShippingInfo();
  loadSummary();
</script>
<script>
  window.addEventListener("load", function () {
    document.body.classList.add("app-loaded");
  });
</script>
<script src="./assets/js/theme.js"></script>
</body>
</html>
